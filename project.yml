name: GrooveMate
options:
  bundleIdPrefix: com.danielecostarella
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GrooveKit:
    path: Packages/GrooveKit

targets:
  GrooveMate:
    type: application
    platform: iOS
    sources:
      - App
      - path: Shared
      - path: Resources/DrumKits
        type: folder
        buildPhase: resources
    dependencies:
      - package: GrooveKit
        products:
          - GrooveModel
          - GrooveBrain
          - GrooveEngine
      - target: GrooveMateWidget
        embed: true
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown,
           UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        NSMicrophoneUsageDescription: GrooveMate uses the microphone so you can talk to your drummer.
        NSSpeechRecognitionUsageDescription: Voice commands are transcribed on your device to control the drummer. Nothing leaves your iPhone.
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielecostarella.groovemate
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: 5.10
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GA7L6R86WU
        ENABLE_PREVIEWS: YES

  GrooveMateWidget:
    type: app-extension
    platform: iOS
    sources:
      - GrooveMateWidget
      - path: Shared
    info:
      path: GrooveMateWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielecostarella.groovemate.widget
        PRODUCT_NAME: GrooveMateWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: 5.10
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: GA7L6R86WU
        SKIP_INSTALL: YES
